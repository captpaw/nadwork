# Gitleaks configuration for NadWork
# Docs: https://github.com/gitleaks/gitleaks#configuration
#
# Strategy: targeted rules only, no useDefault — avoids Web3 false positives
# from hex strings, Pinata header names, and placeholder values.

title = "NadWork Gitleaks Config"

# ─── Global allowlist ─────────────────────────────────────────────────────────
[allowlist]
description = "Global false-positive suppressions for NadWork"
paths = [
  '''.env\.example$''',
  '''frontend/.env\.example$''',
  '''workers/pin-proxy/index\.js$''',
  '''workers/pin-proxy/README\.md$''',
  '''SECURITY\.md$''',
  '''CHANGELOG\.md$''',
  '''README\.md$''',
  '''test/.*\.js$''',
  '''test/.*\.ts$''',
]
regexes = [
  # Public blockchain addresses are not secrets
  '''0x[0-9a-fA-F]{40}''',
  # Variable references — not hardcoded values
  '''(?:process\.env|import\.meta\.env)\.\w+''',
  # Pinata HTTP header name (not a value)
  '''pinata_(?:api_key|secret_api_key)\s*:\s*\w+''',
  # Empty assignments
  '''(?i)(?:private_key|secret|token|api_key|password)\s*=\s*$''',
]

# ─── Rule: Ethereum private key (64 hex chars) ────────────────────────────────
[[rules]]
id          = "eth-private-key"
description = "Ethereum private key — 64 raw hex characters"
regex       = '''(?i)(?:PRIVATE_KEY|private_key)\s*[=:]\s*[0-9a-fA-F]{64}\b'''
entropy     = 3.5
keywords    = ["private_key"]

[rules.allowlist]
regexes = ['''process\.env|import\.meta''']

# ─── Rule: Pinata API key with actual hex value ────────────────────────────────
[[rules]]
id          = "pinata-api-key-value"
description = "Pinata API key with a real hex value (not a variable reference)"
regex       = '''(?i)PINATA_API_KEY\s*=\s*['"]?([a-fA-F0-9]{20,})['"]?'''
entropy     = 3.0
keywords    = ["pinata_api_key"]

[rules.allowlist]
regexes = [
  '''PINATA_API_KEY\s*=\s*$''',
  '''process\.env|import\.meta''',
]

# ─── Rule: Pinata secret with actual hex value ─────────────────────────────────
[[rules]]
id          = "pinata-secret-value"
description = "Pinata secret API key with a real value"
regex       = '''(?i)PINATA_SECRET(?:_API_KEY)?\s*=\s*['"]?([a-fA-F0-9]{32,})['"]?'''
entropy     = 3.5
keywords    = ["pinata_secret"]

[rules.allowlist]
regexes = [
  '''PINATA_SECRET\w*\s*=\s*$''',
  '''process\.env|import\.meta''',
]

# ─── Rule: WalletConnect Project ID ───────────────────────────────────────────
[[rules]]
id          = "walletconnect-project-id"
description = "WalletConnect Project ID — 32 hex chars"
regex       = '''(?i)WALLETCONNECT_PROJECT_ID\s*=\s*['"]?([a-fA-F0-9]{32})['"]?'''
entropy     = 3.0
keywords    = ["walletconnect_project_id"]

[rules.allowlist]
regexes = ['''WALLETCONNECT_PROJECT_ID\s*=\s*$''']

# ─── Rule: BIP39 mnemonic phrase ──────────────────────────────────────────────
[[rules]]
id          = "mnemonic-phrase"
description = "BIP39 mnemonic seed phrase"
regex       = '''(?i)mnemonic\s*[=:]\s*['"]?([a-z]+ ){11,23}[a-z]+['"]?'''
entropy     = 3.0
keywords    = ["mnemonic"]
