name       = "nadwork-pin-proxy"
main       = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# â”€â”€ Routes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Uncomment and fill in after connecting your domain in Cloudflare Dashboard.
# The worker will handle POST https://nadwork.xyz/api/pin
#
# [[routes]]
# pattern = "nadwork.xyz/api/pin"
# zone_name = "nadwork.xyz"

# â”€â”€ Public env vars (non-secret) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[vars]
ALLOWED_ORIGIN = "https://nadwork.xyz"
# Optional strict mode (non-browser clients):
# REQUIRE_PROXY_TOKEN = "1"
# For local dev override (wrangler dev reads .dev.vars instead):
# ALLOWED_ORIGIN = "http://localhost:3000"

# â”€â”€ Secrets (set via CLI â€” never stored in this file) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Run these once after `wrangler login`:
#
#   npx wrangler secret put PINATA_API_KEY
#   npx wrangler secret put PINATA_API_SECRET
#   npx wrangler secret put PROXY_AUTH_TOKEN   # only if REQUIRE_PROXY_TOKEN=1
#
# PROXY_AUTH_TOKEN can be any random string, e.g.:
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
